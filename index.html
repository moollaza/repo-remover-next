<!doctype html>
<html lang="en" class="min-h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />

    <title>Repo Remover — Bulk Archive &amp; Delete GitHub Repos</title>
    <meta name="description" content="Bulk view, archive, and delete your GitHub repositories. Zero-knowledge — everything runs in your browser. No data stored, no backend." />
    <link rel="canonical" href="https://reporemover.xyz/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://reporemover.xyz/" />
    <meta property="og:title" content="Repo Remover — Bulk Archive & Delete GitHub Repos" />
    <meta property="og:description" content="Bulk view, archive, and delete your GitHub repositories. Zero-knowledge — everything runs in your browser. No data stored, no backend." />
    <meta property="og:site_name" content="Repo Remover" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Repo Remover — Bulk Archive & Delete GitHub Repos" />
    <meta name="twitter:description" content="Bulk view, archive, and delete your GitHub repositories. Zero-knowledge — everything runs in your browser. No data stored, no backend." />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Repo Remover",
        "url": "https://reporemover.xyz",
        "description": "Bulk view, archive, and delete your GitHub repositories. Zero-knowledge — everything runs in your browser. No data stored, no backend.",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Any",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "browserRequirements": "Requires a modern browser with JavaScript enabled",
        "softwareHelp": {
          "@type": "CreativeWork",
          "url": "https://github.com/moollaza/repo-remover"
        },
        "isAccessibleForFree": true
      }
    </script>

    <!-- Inter font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />

    <!-- Prevent flash of wrong theme (class-based dark mode) -->
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (t === "dark" || (!t && matchMedia("(prefers-color-scheme:dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body class="min-h-full bg-background text-foreground font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
